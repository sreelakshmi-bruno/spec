openapi: 3.0.3
info:
  title: Tiny Example API 3
  version: 1.3.1

servers:
  - url: https://api.example.com

paths:
  /health:
    get:
      summary: Check service health status and availability
      parameters:
        - name: verbose
          in: query
          required: false
          schema:
            type: boolean
          description: Include detailed health info
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [json, text]
            default: json
          description: Response format
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  uptime:
                    type: integer
                  timestamp:
                    type: string
                    format: date-time
                required: [status, timestamp]
              example:
                status: ok
                uptime: 3600
                timestamp: "2024-01-15T10:30:00Z"

  /users:
    get:
      summary: Retrieve paginated list of users
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Pagination offset
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    email:
                      type: string
                  required: [id, email]
              example:
                - id: "1"
                  email: user@example.com

    post:
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                name:
                  type: string
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  enum: [user, admin, moderator]
                  default: user
              required: [email, password]
            example:
              email: newuser@example.com
              name: New User
              password: securepass123
              role: user
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  email:
                    type: string
                  name:
                    type: string
                required: [id, email]
              example:
                id: "2"
                email: newuser@example.com
                name: New User

  /users/{id}:
    get:
      summary: Get a specific user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  email:
                    type: string
                  name:
                    type: string
                required: [id, email]
              example:
                id: "1"
                email: user@example.com
                name: John Doe
        "404":
          description: User not found

    delete:
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: User deleted

  /products:
    get:
      summary: List all products
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Filter by category
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    price:
                      type: number
                    category:
                      type: string
                  required: [id, name, price]
              example:
                - id: "p1"
                  name: Widget
                  price: 29.99
                  category: electronics

    post:
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                price:
                  type: number
                category:
                  type: string
              required: [name, price]
            example:
              name: New Widget
              price: 29.99
              category: electronics
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  price:
                    type: number
                required: [id, name, price]
              example:
                id: "p2"
                name: New Widget
                price: 29.99

  /products/{id}:
    patch:
      summary: Partially update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                price:
                  type: number
                category:
                  type: string
            example:
              price: 24.99
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  price:
                    type: number
                required: [id, name, price]
              example:
                id: "p1"
                name: Widget
                price: 24.99

  /items:
    post:
      summary: Add an item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
              required: [name]
            example:
              name: Sample item
              description: A sample item description
              tags: [new, featured]
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                required: [id, name]
              example:
                id: "123"
                name: Sample item
                description: A sample item description

  /items/{id}:
    get:
      summary: Retrieve item details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: include_metadata
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Include item metadata in response
      responses:
        "200":
          description: Item details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  created_at:
                    type: string
                    format: date-time
                required: [id, name]
              example:
                id: "123"
                name: Sample item
                created_at: "2024-01-15T10:30:00Z"

    put:
      summary: Update an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
              required: [name]
            example:
              name: Updated item
              description: Updated description
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                required: [id, name]
              example:
                id: "123"
                name: Updated item

    delete:
      summary: Delete an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Item deleted
        "404":
          description: Item not found

  /orders:
    get:
      summary: Retrieve orders with optional filters
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, processing, completed, cancelled]
          description: Filter by order status
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Maximum number of orders to return
        - name: date_from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter orders from this date onwards
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    user_id:
                      type: string
                    total:
                      type: number
                    status:
                      type: string
                  required: [id, user_id, total, status]
              example:
                - id: "ord-123"
                  user_id: "1"
                  total: 39.98
                  status: pending

  /reviews:
    get:
      summary: List product reviews
      parameters:
        - name: product_id
          in: query
          required: false
          schema:
            type: string
          description: Filter reviews by product
        - name: rating
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 5
          description: Filter by star rating
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    product_id:
                      type: string
                    user_id:
                      type: string
                    rating:
                      type: integer
                    comment:
                      type: string
                  required: [id, product_id, rating]
              example:
                - id: "rev-1"
                  product_id: "p1"
                  user_id: "1"
                  rating: 5
                  comment: Great product!

    post:
      summary: Submit a product review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: string
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
              required: [product_id, rating]
            example:
              product_id: "p1"
              rating: 4
              comment: Good quality
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  product_id:
                    type: string
                  rating:
                    type: integer
                required: [id, product_id, rating]
              example:
                id: "rev-2"
                product_id: "p1"
                rating: 4
